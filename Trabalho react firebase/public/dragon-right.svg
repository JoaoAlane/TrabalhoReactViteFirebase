<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400">
  <!-- Mirror transform for right side -->
  <g transform="scale(-1, 1) translate(-200, 0)">
    <!-- Dragon head -->
    <circle cx="100" cy="80" r="35" fill="#b91c1c" opacity="0.8"/>
    
    <!-- Dragon horns -->
    <path d="M 75 55 Q 60 30 50 20" stroke="#b91c1c" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 125 55 Q 140 30 150 20" stroke="#b91c1c" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Dragon eyes -->
    <circle cx="90" cy="75" r="5" fill="#ff4444"/>
    <circle cx="110" cy="75" r="5" fill="#ff4444"/>
    
    <!-- Dragon mouth -->
    <path d="M 85 90 Q 100 100 115 90" stroke="#b91c1c" stroke-width="2" fill="none" opacity="0.8"/>
    
    <!-- Dragon body waves -->
    <path d="M 100 110 Q 80 140 90 170 Q 100 190 110 170 Q 120 140 100 200" stroke="#b91c1c" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Dragon body scales -->
    <ellipse cx="70" cy="150" rx="15" ry="20" fill="none" stroke="#b91c1c" stroke-width="2" opacity="0.6"/>
    <ellipse cx="130" cy="150" rx="15" ry="20" fill="none" stroke="#b91c1c" stroke-width="2" opacity="0.6"/>
    <ellipse cx="75" cy="200" rx="12" ry="18" fill="none" stroke="#b91c1c" stroke-width="2" opacity="0.6"/>
    <ellipse cx="125" cy="200" rx="12" ry="18" fill="none" stroke="#b91c1c" stroke-width="2" opacity="0.6"/>
    
    <!-- Dragon tail -->
    <path d="M 100 250 Q 70 280 60 330 Q 55 360 65 380" stroke="#b91c1c" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Decorative circles -->
    <circle cx="100" cy="130" r="3" fill="#ff4444" opacity="0.5"/>
    <circle cx="95" cy="160" r="3" fill="#ff4444" opacity="0.5"/>
    <circle cx="105" cy="160" r="3" fill="#ff4444" opacity="0.5"/>
    <circle cx="100" cy="190" r="3" fill="#ff4444" opacity="0.5"/>
  </g>
</svg>